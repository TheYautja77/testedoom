<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Doom</title>

<script src="https://v8.js-dos.com/latest/js-dos.js"></script>

<style>
html, body {
    margin:0;
    padding:0;
    background:black;
    width:100%;
    height:100%;
    overflow:hidden;
}

#dos {
    width:100vw;
    height:100vh;
}

canvas {
    image-rendering: pixelated;
}
</style>
</head>

<body>

<div id="dos"></div>

<script>
emulators.dos(document.getElementById("dos"), {
    kiosk: true
}).then((ci) => {
    ci.run("https://v8.js-dos.com/bundles/doom.jsdos");
});
</script>

</body>
</html>
